artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Create a JSON summary of the Apache-style access log supplied at /app/access.log."

[verifier]
timeout_sec = 120.0

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = "access_log_analysis"
artifact_type = "json_report"
expert_time_estimate_hours = 0.25
model_tested = "GPT-5.4"
agent_tested = "oracle"
difficulty_explanation = "The task requires parsing Apache-style request lines and computing exact aggregate statistics."
solution_explanation = "Parse every nonempty log entry, count entries and distinct client IPs, count request paths, and write the required JSON object."
verification_explanation = "The verifier checks the report path, exact JSON schema, and the three exact aggregates derived from the supplied log."

[environment]
allow_internet = true
mcp_servers = []
